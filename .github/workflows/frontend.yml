name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: 'latest'
        channel: 'stable'
    
    - name: Get dependencies
      run: flutter pub get

    - name: Build Web
      run: flutter build web
